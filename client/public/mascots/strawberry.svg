<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Strawberry Prudence">
  <defs>
    <radialGradient id="sb" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF9090"/>
      <stop offset="70%" stop-color="#E84040"/>
      <stop offset="100%" stop-color="#C01818"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#901010" flood-opacity="0.22"/></filter>
  </defs>
  <!-- Crown: 3 leaf points -->
  <ellipse cx="60" cy="19" rx="6" ry="11" fill="#5AB870" transform="rotate(-5 60 19)"/>
  <ellipse cx="48" cy="23" rx="5" ry="9" fill="#5AB870" transform="rotate(-30 48 23)"/>
  <ellipse cx="72" cy="23" rx="5" ry="9" fill="#5AB870" transform="rotate(30 72 23)"/>
  <!-- Body -->
  <circle cx="60" cy="67" r="44" fill="url(#sb)" filter="url(#sh)"/>
  <!-- Seeds -->
  <ellipse cx="50" cy="55" rx="2.5" ry="3.5" fill="#FFEE88" transform="rotate(-15 50 55)"/>
  <ellipse cx="62" cy="50" rx="2.5" ry="3.5" fill="#FFEE88"/>
  <ellipse cx="74" cy="55" rx="2.5" ry="3.5" fill="#FFEE88" transform="rotate(15 74 55)"/>
  <ellipse cx="46" cy="70" rx="2.5" ry="3.5" fill="#FFEE88" transform="rotate(-10 46 70)"/>
  <ellipse cx="62" cy="67" rx="2.5" ry="3.5" fill="#FFEE88"/>
  <ellipse cx="78" cy="70" rx="2.5" ry="3.5" fill="#FFEE88" transform="rotate(10 78 70)"/>
  <!-- Eyes — simple dots -->
  <circle cx="47" cy="62" r="5" fill="#2D0808"/>
  <circle cx="73" cy="62" r="5" fill="#2D0808"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="72" rx="10" ry="7" fill="#FF6060" opacity="0.32"/>
  <ellipse cx="84" cy="72" rx="10" ry="7" fill="#FF6060" opacity="0.32"/>
  <!-- Smile -->
  <path d="M 45 76 Q 60 92 75 76" stroke="#2D0808" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
