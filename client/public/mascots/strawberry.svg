<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Strawberry mascot">
  <defs>
    <radialGradient id="sb_body" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FF8888"/>
      <stop offset="55%"  stop-color="#E84040"/>
      <stop offset="100%" stop-color="#B01818"/>
    </radialGradient>
    <radialGradient id="sb_tummy" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD0D0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD0D0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sb_cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C82020" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C82020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sb_cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C82020" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C82020" stop-opacity="0"/>
    </radialGradient>
    <filter id="sb_shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#B01818" flood-opacity="0.30"/>
    </filter>
    <filter id="sb_crownShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#2A6030" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Green 3-leaf crown -->
  <g filter="url(#sb_crownShadow)">
    <!-- Center leaf -->
    <ellipse cx="58" cy="16" rx="6" ry="12" fill="#5CB85C" transform="rotate(0 58 16)"/>
    <ellipse cx="58" cy="14" rx="3" ry="6" fill="#80D080" opacity="0.6" transform="rotate(0 58 14)"/>
    <!-- Left leaf -->
    <ellipse cx="48" cy="20" rx="6" ry="11" fill="#5CB85C" transform="rotate(-30 48 20)"/>
    <ellipse cx="47" cy="18" rx="3" ry="5.5" fill="#80D080" opacity="0.6" transform="rotate(-30 47 18)"/>
    <!-- Right leaf -->
    <ellipse cx="68" cy="20" rx="6" ry="11" fill="#5CB85C" transform="rotate(30 68 20)"/>
    <ellipse cx="69" cy="18" rx="3" ry="5.5" fill="#80D080" opacity="0.6" transform="rotate(30 69 18)"/>
    <!-- Stem base -->
    <rect x="56" y="26" width="4" height="8" rx="2" fill="#4A8A4A"/>
  </g>
  <!-- Body -->
  <circle cx="58" cy="66" r="46" fill="url(#sb_body)" filter="url(#sb_shadow)"/>
  <!-- Tummy -->
  <ellipse cx="58" cy="74" rx="26" ry="30" fill="url(#sb_tummy)"/>
  <!-- Shine -->
  <ellipse cx="44" cy="44" rx="13" ry="9" fill="white" opacity="0.18" transform="rotate(-20 44 44)"/>
  <!-- Seeds (yellow teardrops) -->
  <ellipse cx="50" cy="52" rx="2.5" ry="4" fill="#F5E020" transform="rotate(-15 50 52)"/>
  <ellipse cx="64" cy="50" rx="2.5" ry="4" fill="#F5E020" transform="rotate(10 64 50)"/>
  <ellipse cx="44" cy="64" rx="2.5" ry="4" fill="#F5E020" transform="rotate(-20 44 64)"/>
  <ellipse cx="72" cy="62" rx="2.5" ry="4" fill="#F5E020" transform="rotate(20 72 62)"/>
  <ellipse cx="54" cy="78" rx="2.5" ry="4" fill="#F5E020" transform="rotate(-5 54 78)"/>
  <ellipse cx="68" cy="76" rx="2.5" ry="4" fill="#F5E020" transform="rotate(15 68 76)"/>
  <ellipse cx="40" cy="76" rx="2.5" ry="4" fill="#F5E020" transform="rotate(-25 40 76)"/>
  <ellipse cx="76" cy="76" rx="2.5" ry="4" fill="#F5E020" transform="rotate(25 76 76)"/>
  <!-- Eyes -->
  <ellipse cx="46" cy="60" rx="5.5" ry="6.5" fill="#3A2410"/>
  <ellipse cx="70" cy="60" rx="5.5" ry="6.5" fill="#3A2410"/>
  <circle cx="48.5" cy="57.5" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="72.5" cy="57.5" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="46.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <circle cx="70.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <!-- Cheeks -->
  <ellipse cx="37" cy="70" rx="11" ry="7" fill="url(#sb_cheekL)"/>
  <ellipse cx="79" cy="70" rx="11" ry="7" fill="url(#sb_cheekR)"/>
  <!-- Smile -->
  <path d="M 46 76 Q 58 90 70 76" stroke="#3A2410" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <circle cx="70.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <!-- Arms -->
  <ellipse cx="16" cy="72" rx="9" ry="6" fill="#C82020" transform="rotate(-15 16 72)"/>
  <ellipse cx="100" cy="72" rx="9" ry="6" fill="#C82020" transform="rotate(15 100 72)"/>
</svg>
