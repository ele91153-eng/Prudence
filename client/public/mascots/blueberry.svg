<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Blueberry Prudence">
  <defs>
    <radialGradient id="bb" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#C0A0E8"/>
      <stop offset="70%" stop-color="#7048B4"/>
      <stop offset="100%" stop-color="#4A2890"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2A1060" flood-opacity="0.28"/></filter>
  </defs>
  <!-- Dried flower crown -->
  <circle cx="60" cy="24" r="5" fill="#8B6040"/>
  <ellipse cx="60" cy="15" rx="3" ry="6" fill="#7A5030"/>
  <ellipse cx="68" cy="19" rx="3" ry="6" fill="#7A5030" transform="rotate(45 68 19)"/>
  <ellipse cx="52" cy="19" rx="3" ry="6" fill="#7A5030" transform="rotate(-45 52 19)"/>
  <ellipse cx="65" cy="27" rx="3" ry="5.5" fill="#7A5030" transform="rotate(75 65 27)"/>
  <ellipse cx="55" cy="27" rx="3" ry="5.5" fill="#7A5030" transform="rotate(-75 55 27)"/>
  <!-- Body -->
  <circle cx="60" cy="68" r="43" fill="url(#bb)" filter="url(#sh)"/>
  <!-- Eyes — simple dots -->
  <circle cx="47" cy="63" r="5" fill="#1A0840"/>
  <circle cx="73" cy="63" r="5" fill="#1A0840"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="73" rx="10" ry="7" fill="#9060C0" opacity="0.32"/>
  <ellipse cx="84" cy="73" rx="10" ry="7" fill="#9060C0" opacity="0.32"/>
  <!-- Smile -->
  <path d="M 45 77 Q 60 93 75 77" stroke="#1A0840" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
