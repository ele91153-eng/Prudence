<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Blueberry mascot">
  <defs>
    <radialGradient id="bb_body" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#A880E0"/>
      <stop offset="55%"  stop-color="#7048B4"/>
      <stop offset="100%" stop-color="#4828A0"/>
    </radialGradient>
    <radialGradient id="bb_tummy" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D0B8F8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D0B8F8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bb_cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8060C0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8060C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bb_cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8060C0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8060C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="bb_shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4828A0" flood-opacity="0.30"/>
    </filter>
    <filter id="bb_crownShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#5A3A20" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Dried flower crown (blueberry end) — 6-petal brown circle -->
  <g filter="url(#bb_crownShadow)">
    <circle cx="58" cy="20" r="7" fill="#8B6030"/>
    <!-- 6 petals radiating outward -->
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228"/>
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228" transform="rotate(60 58 20)"/>
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228" transform="rotate(120 58 20)"/>
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228" transform="rotate(180 58 20)"/>
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228" transform="rotate(240 58 20)"/>
    <ellipse cx="58" cy="12" rx="2.5" ry="4" fill="#7A5228" transform="rotate(300 58 20)"/>
    <!-- Center dot -->
    <circle cx="58" cy="20" r="4" fill="#6A4020"/>
    <circle cx="58" cy="20" r="2" fill="#8B6030"/>
  </g>
  <!-- Body -->
  <circle cx="58" cy="66" r="46" fill="url(#bb_body)" filter="url(#bb_shadow)"/>
  <!-- Tummy -->
  <ellipse cx="58" cy="74" rx="26" ry="30" fill="url(#bb_tummy)"/>
  <!-- Shine -->
  <ellipse cx="44" cy="44" rx="13" ry="9" fill="white" opacity="0.18" transform="rotate(-20 44 44)"/>
  <!-- Eyes (slightly smaller) -->
  <ellipse cx="46" cy="60" rx="5" ry="6" fill="#3A2410"/>
  <ellipse cx="70" cy="60" rx="5" ry="6" fill="#3A2410"/>
  <circle cx="48.5" cy="57.5" r="2" fill="white" opacity="0.85"/>
  <circle cx="72.5" cy="57.5" r="2" fill="white" opacity="0.85"/>
  <circle cx="46.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <circle cx="70.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <!-- Cheeks -->
  <ellipse cx="37" cy="70" rx="11" ry="7" fill="url(#bb_cheekL)"/>
  <ellipse cx="79" cy="70" rx="11" ry="7" fill="url(#bb_cheekR)"/>
  <!-- Smile -->
  <path d="M 46 76 Q 58 90 70 76" stroke="#3A2410" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <circle cx="70.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <!-- Arms -->
  <ellipse cx="16" cy="72" rx="9" ry="6" fill="#5830A0" transform="rotate(-15 16 72)"/>
  <ellipse cx="100" cy="72" rx="9" ry="6" fill="#5830A0" transform="rotate(15 100 72)"/>
</svg>
