<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diamond Prudence">
  <defs>
    <radialGradient id="db" cx="35%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F0FAFF"/>
      <stop offset="55%" stop-color="#C0E4F5"/>
      <stop offset="100%" stop-color="#80B8E0"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4888B8" flood-opacity="0.22"/></filter>
  </defs>
  <!-- Crystal crown -->
  <polygon points="60,12 52,26 60,22 68,26" fill="#A8D8F0"/>
  <polygon points="52,26 44,28 52,32" fill="#C0E8FF"/>
  <polygon points="68,26 76,28 68,32" fill="#C0E8FF"/>
  <line x1="60" y1="22" x2="60" y2="38" stroke="#90C8E8" stroke-width="1.5" opacity="0.6"/>
  <!-- Body -->
  <circle cx="60" cy="67" r="44" fill="url(#db)" filter="url(#sh)"/>
  <!-- Facet lines -->
  <path d="M 30 55 L 60 40 L 90 55" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 20 75 L 60 60 L 100 75" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Shine -->
  <ellipse cx="42" cy="48" rx="12" ry="8" fill="white" opacity="0.3" transform="rotate(-20 42 48)"/>
  <!-- Eyes — simple dots -->
  <circle cx="47" cy="62" r="5" fill="#2A4870"/>
  <circle cx="73" cy="62" r="5" fill="#2A4870"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="72" rx="10" ry="7" fill="#80B0D8" opacity="0.28"/>
  <ellipse cx="84" cy="72" rx="10" ry="7" fill="#80B0D8" opacity="0.28"/>
  <!-- Smile -->
  <path d="M 45 76 Q 60 92 75 76" stroke="#2A4870" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
