<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diamond mascot">
  <defs>
    <radialGradient id="dm_body" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#E0F4FF"/>
      <stop offset="55%"  stop-color="#C0E4F5"/>
      <stop offset="100%" stop-color="#88C0E8"/>
    </radialGradient>
    <radialGradient id="dm_tummy" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dm_cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B0C8E8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B0C8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dm_cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B0C8E8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B0C8E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="dm_shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#88C0E8" flood-opacity="0.40"/>
    </filter>
    <filter id="dm_crownShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#5090C0" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Crystal crown (angular diamond shape) -->
  <g filter="url(#dm_crownShadow)">
    <!-- Crown base band -->
    <rect x="46" y="26" width="24" height="6" rx="1" fill="#90C8E8"/>
    <!-- Crown points -->
    <polygon points="48,26 52,14 56,26" fill="#B8E0F8"/>
    <polygon points="54,26 58,10 62,26" fill="#D0EEFF"/>
    <polygon points="60,26 64,14 68,26" fill="#B8E0F8"/>
    <!-- Crown facet highlights -->
    <line x1="52" y1="14" x2="56" y2="26" stroke="white" stroke-width="0.8" opacity="0.6"/>
    <line x1="58" y1="10" x2="54" y2="26" stroke="white" stroke-width="0.8" opacity="0.6"/>
    <line x1="58" y1="10" x2="62" y2="26" stroke="white" stroke-width="0.8" opacity="0.6"/>
    <line x1="64" y1="14" x2="60" y2="26" stroke="white" stroke-width="0.8" opacity="0.6"/>
    <!-- Crown gems -->
    <circle cx="52" cy="14" r="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="58" cy="10" r="2.5" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="64" cy="14" r="2" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <!-- Body -->
  <circle cx="58" cy="66" r="46" fill="url(#dm_body)" filter="url(#dm_shadow)"/>
  <!-- Extra top-left shine (large white ellipse) -->
  <ellipse cx="40" cy="46" rx="18" ry="12" fill="white" opacity="0.30" transform="rotate(-20 40 46)"/>
  <!-- Tummy (extra bright) -->
  <ellipse cx="58" cy="74" rx="26" ry="30" fill="url(#dm_tummy)"/>
  <!-- Crystal facet lines on body -->
  <path d="M 28 52 L 58 38 L 88 56" stroke="white" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M 22 70 L 58 58 L 94 72" stroke="white" stroke-width="1" fill="none" opacity="0.20"/>
  <path d="M 26 86 L 58 76 L 90 88" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 42 38 L 38 80" stroke="white" stroke-width="0.8" fill="none" opacity="0.20"/>
  <!-- Standard shine -->
  <ellipse cx="44" cy="44" rx="13" ry="9" fill="white" opacity="0.28" transform="rotate(-20 44 44)"/>
  <!-- Eyes (blue-tinted dark) -->
  <ellipse cx="46" cy="60" rx="5.5" ry="6.5" fill="#2A3A50"/>
  <ellipse cx="70" cy="60" rx="5.5" ry="6.5" fill="#2A3A50"/>
  <circle cx="48.5" cy="57.5" r="2.2" fill="white" opacity="0.90"/>
  <circle cx="72.5" cy="57.5" r="2.2" fill="white" opacity="0.90"/>
  <circle cx="46.5" cy="62.5" r="1" fill="white" opacity="0.5"/>
  <circle cx="70.5" cy="62.5" r="1" fill="white" opacity="0.5"/>
  <!-- Cheeks -->
  <ellipse cx="37" cy="70" rx="11" ry="7" fill="url(#dm_cheekL)"/>
  <ellipse cx="79" cy="70" rx="11" ry="7" fill="url(#dm_cheekR)"/>
  <!-- Smile -->
  <path d="M 46 76 Q 58 90 70 76" stroke="#2A3A50" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45.5" cy="75.5" r="1.5" fill="#2A3A50"/>
  <circle cx="70.5" cy="75.5" r="1.5" fill="#2A3A50"/>
  <!-- Arms -->
  <ellipse cx="16" cy="72" rx="9" ry="6" fill="#90C0E4" transform="rotate(-15 16 72)"/>
  <ellipse cx="100" cy="72" rx="9" ry="6" fill="#90C0E4" transform="rotate(15 100 72)"/>
</svg>
