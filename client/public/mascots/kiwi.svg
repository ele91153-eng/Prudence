<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kiwi Prudence">
  <defs>
    <radialGradient id="kb" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#C49870"/>
      <stop offset="70%" stop-color="#8B5A28"/>
      <stop offset="100%" stop-color="#6A3E18"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4A2808" flood-opacity="0.25"/></filter>
  </defs>
  <!-- Stem + small leaf -->
  <path d="M 60 22 Q 62 30 60 38" stroke="#7A4820" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="68" cy="25" rx="7" ry="5" fill="#5AB870" transform="rotate(-30 68 25)"/>
  <!-- Body -->
  <circle cx="60" cy="67" r="44" fill="url(#kb)" filter="url(#sh)"/>
  <!-- Kiwi cross-section -->
  <ellipse cx="60" cy="67" rx="22" ry="24" fill="#70C040" opacity="0.85"/>
  <circle cx="60" cy="67" r="6" fill="white" opacity="0.7"/>
  <!-- Seeds -->
  <ellipse cx="60" cy="46" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6"/>
  <ellipse cx="75" cy="51" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(60 75 51)"/>
  <ellipse cx="80" cy="67" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(90 80 67)"/>
  <ellipse cx="75" cy="83" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(120 75 83)"/>
  <ellipse cx="60" cy="88" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6"/>
  <ellipse cx="45" cy="83" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(60 45 83)"/>
  <ellipse cx="40" cy="67" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(90 40 67)"/>
  <ellipse cx="45" cy="51" rx="2" ry="3.5" fill="#1A1A1A" opacity="0.6" transform="rotate(120 45 51)"/>
  <!-- Eyes — simple dots -->
  <circle cx="47" cy="60" r="5" fill="#1A1A0A"/>
  <circle cx="73" cy="60" r="5" fill="#1A1A0A"/>
  <!-- Cheeks -->
  <ellipse cx="36" cy="70" rx="10" ry="7" fill="#C07840" opacity="0.32"/>
  <ellipse cx="84" cy="70" rx="10" ry="7" fill="#C07840" opacity="0.32"/>
  <!-- Smile -->
  <path d="M 45 74 Q 60 90 75 74" stroke="#1A1A0A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
