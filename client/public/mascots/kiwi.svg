<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kiwi mascot">
  <defs>
    <radialGradient id="kw_body" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#C4905A"/>
      <stop offset="55%"  stop-color="#9B6B3A"/>
      <stop offset="100%" stop-color="#6B4A20"/>
    </radialGradient>
    <radialGradient id="kw_tummy" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8D0A8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8D0A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kw_green" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A0E060"/>
      <stop offset="100%" stop-color="#70C040"/>
    </radialGradient>
    <radialGradient id="kw_cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8AB850" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8AB850" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kw_cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8AB850" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8AB850" stop-opacity="0"/>
    </radialGradient>
    <filter id="kw_shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#6B4A20" flood-opacity="0.30"/>
    </filter>
    <filter id="kw_stemShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#3A6020" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Brown stem + small green leaves -->
  <g filter="url(#kw_stemShadow)">
    <rect x="56" y="18" width="4" height="10" rx="2" fill="#7A5228"/>
    <ellipse cx="52" cy="19" rx="6" ry="4" fill="#5A9A30" transform="rotate(-20 52 19)"/>
    <ellipse cx="64" cy="19" rx="6" ry="4" fill="#5A9A30" transform="rotate(20 64 19)"/>
    <ellipse cx="51" cy="18" rx="3" ry="2" fill="#80C050" opacity="0.6" transform="rotate(-20 51 18)"/>
    <ellipse cx="65" cy="18" rx="3" ry="2" fill="#80C050" opacity="0.6" transform="rotate(20 65 18)"/>
  </g>
  <!-- Body -->
  <circle cx="58" cy="66" r="46" fill="url(#kw_body)" filter="url(#kw_shadow)"/>
  <!-- Green center oval -->
  <ellipse cx="58" cy="66" rx="22" ry="24" fill="url(#kw_green)"/>
  <!-- White center core -->
  <ellipse cx="58" cy="66" rx="5" ry="5" fill="#F0F8D8" opacity="0.8"/>
  <!-- Seed dots radiating from center -->
  <ellipse cx="58" cy="50" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(0 58 50)"/>
  <ellipse cx="66" cy="52" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(45 66 52)"/>
  <ellipse cx="70" cy="60" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(90 70 60)"/>
  <ellipse cx="67" cy="69" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(135 67 69)"/>
  <ellipse cx="58" cy="74" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(0 58 74)"/>
  <ellipse cx="49" cy="71" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(-45 49 71)"/>
  <ellipse cx="45" cy="62" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(-90 45 62)"/>
  <ellipse cx="49" cy="53" rx="2" ry="3.5" fill="#2A1A08" transform="rotate(-135 49 53)"/>
  <!-- Shine -->
  <ellipse cx="44" cy="44" rx="13" ry="9" fill="white" opacity="0.18" transform="rotate(-20 44 44)"/>
  <!-- Eyes -->
  <ellipse cx="46" cy="60" rx="5.5" ry="6.5" fill="#3A2410"/>
  <ellipse cx="70" cy="60" rx="5.5" ry="6.5" fill="#3A2410"/>
  <circle cx="48.5" cy="57.5" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="72.5" cy="57.5" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="46.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <circle cx="70.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <!-- Cheeks -->
  <ellipse cx="37" cy="70" rx="11" ry="7" fill="url(#kw_cheekL)"/>
  <ellipse cx="79" cy="70" rx="11" ry="7" fill="url(#kw_cheekR)"/>
  <!-- Smile -->
  <path d="M 46 76 Q 58 90 70 76" stroke="#3A2410" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <circle cx="70.5" cy="75.5" r="1.5" fill="#3A2410"/>
  <!-- Arms -->
  <ellipse cx="16" cy="72" rx="9" ry="6" fill="#7A4E28" transform="rotate(-15 16 72)"/>
  <ellipse cx="100" cy="72" rx="9" ry="6" fill="#7A4E28" transform="rotate(15 100 72)"/>
</svg>
