<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cosmic mascot">
  <defs>
    <radialGradient id="cs_body" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#4428A0"/>
      <stop offset="55%"  stop-color="#1A0A50"/>
      <stop offset="100%" stop-color="#0A0528"/>
    </radialGradient>
    <radialGradient id="cs_tummy" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8060C0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8060C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cs_cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8060C0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8060C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cs_cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8060C0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8060C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="cs_shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0A0528" flood-opacity="0.50"/>
    </filter>
    <filter id="cs_leafShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#202060" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Purple-tinted leaf with silver highlight -->
  <path d="M 68 22 Q 72 32 68 40" stroke="#7060B0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <g filter="url(#cs_leafShadow)">
    <ellipse cx="74" cy="16" rx="10" ry="14" fill="#6050A0" transform="rotate(-30 74 16)"/>
    <ellipse cx="71" cy="13" rx="4.5" ry="7" fill="#C0C0E8" opacity="0.6" transform="rotate(-30 71 13)"/>
    <path d="M 66 23 Q 74 16 80 10" stroke="#9080C0" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
  <!-- Body -->
  <circle cx="58" cy="66" r="46" fill="url(#cs_body)" filter="url(#cs_shadow)"/>
  <!-- Star dots on body (varying sizes) -->
  <circle cx="32" cy="52" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="42" cy="44" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="38" cy="78" r="2" fill="white" opacity="0.85"/>
  <circle cx="30" cy="66" r="1" fill="white" opacity="0.7"/>
  <circle cx="78" cy="48" r="2" fill="white" opacity="0.9"/>
  <circle cx="86" cy="60" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="82" cy="78" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="74" cy="90" r="1" fill="white" opacity="0.7"/>
  <circle cx="44" cy="90" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="62" cy="44" r="1" fill="white" opacity="0.65"/>
  <circle cx="54" cy="96" r="2" fill="white" opacity="0.7"/>
  <circle cx="36" cy="88" r="1" fill="white" opacity="0.6"/>
  <circle cx="84" cy="90" r="1.5" fill="white" opacity="0.65"/>
  <!-- Tummy -->
  <ellipse cx="58" cy="74" rx="26" ry="30" fill="url(#cs_tummy)"/>
  <!-- Shine -->
  <ellipse cx="44" cy="44" rx="13" ry="9" fill="white" opacity="0.12" transform="rotate(-20 44 44)"/>
  <!-- Eyes with sparkle rays -->
  <ellipse cx="46" cy="60" rx="5.5" ry="6.5" fill="#3A2460"/>
  <ellipse cx="70" cy="60" rx="5.5" ry="6.5" fill="#3A2460"/>
  <circle cx="48.5" cy="57.5" r="2.2" fill="white" opacity="0.95"/>
  <circle cx="72.5" cy="57.5" r="2.2" fill="white" opacity="0.95"/>
  <!-- Sparkle rays around left eye -->
  <line x1="46" y1="51" x2="46" y2="49" stroke="white" stroke-width="1" opacity="0.7"/>
  <line x1="51" y1="54" x2="53" y2="53" stroke="white" stroke-width="1" opacity="0.7"/>
  <line x1="41" y1="54" x2="39" y2="53" stroke="white" stroke-width="1" opacity="0.7"/>
  <!-- Sparkle rays around right eye -->
  <line x1="70" y1="51" x2="70" y2="49" stroke="white" stroke-width="1" opacity="0.7"/>
  <line x1="75" y1="54" x2="77" y2="53" stroke="white" stroke-width="1" opacity="0.7"/>
  <line x1="65" y1="54" x2="63" y2="53" stroke="white" stroke-width="1" opacity="0.7"/>
  <circle cx="46.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <circle cx="70.5" cy="62.5" r="1" fill="white" opacity="0.4"/>
  <!-- Cheeks -->
  <ellipse cx="37" cy="70" rx="11" ry="7" fill="url(#cs_cheekL)"/>
  <ellipse cx="79" cy="70" rx="11" ry="7" fill="url(#cs_cheekR)"/>
  <!-- Smile -->
  <path d="M 46 76 Q 58 90 70 76" stroke="#8070C0" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="45.5" cy="75.5" r="1.5" fill="#8070C0"/>
  <circle cx="70.5" cy="75.5" r="1.5" fill="#8070C0"/>
  <!-- 4-pointed stars -->
  <path d="M 26 44 L 27.5 40 L 29 44 L 33 45.5 L 29 47 L 27.5 51 L 26 47 L 22 45.5 Z" fill="white" opacity="0.85"/>
  <path d="M 83 42 L 84.5 38 L 86 42 L 90 43.5 L 86 45 L 84.5 49 L 83 45 L 79 43.5 Z" fill="white" opacity="0.80"/>
  <path d="M 88 80 L 89.5 76 L 91 80 L 95 81.5 L 91 83 L 89.5 87 L 88 83 L 84 81.5 Z" fill="white" opacity="0.75"/>
  <path d="M 22 82 L 23.5 78 L 25 82 L 29 83.5 L 25 85 L 23.5 89 L 22 85 L 18 83.5 Z" fill="white" opacity="0.70"/>
  <path d="M 56 100 L 57.5 96 L 59 100 L 63 101.5 L 59 103 L 57.5 107 L 56 103 L 52 101.5 Z" fill="white" opacity="0.65"/>
  <!-- Arms -->
  <ellipse cx="16" cy="72" rx="9" ry="6" fill="#0D0520" transform="rotate(-15 16 72)"/>
  <ellipse cx="100" cy="72" rx="9" ry="6" fill="#0D0520" transform="rotate(15 100 72)"/>
</svg>
