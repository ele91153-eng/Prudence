<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Watermelon Prudence">
  <defs>
    <radialGradient id="wb" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#90DD90"/>
      <stop offset="70%" stop-color="#3DAF55"/>
      <stop offset="100%" stop-color="#258038"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#186028" flood-opacity="0.22"/></filter>
  </defs>
  <!-- Stem -->
  <path d="M 60 22 Q 62 30 60 38" stroke="#4A9A50" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <circle cx="60" cy="67" r="44" fill="url(#wb)" filter="url(#sh)"/>
  <!-- Darker stripes -->
  <path d="M 40 38 Q 32 67 40 96" stroke="#259040" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M 80 38 Q 88 67 80 96" stroke="#259040" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Seeds -->
  <ellipse cx="48" cy="80" rx="3" ry="4.5" fill="#1A1A1A" opacity="0.5" transform="rotate(-10 48 80)"/>
  <ellipse cx="62" cy="85" rx="3" ry="4.5" fill="#1A1A1A" opacity="0.5"/>
  <ellipse cx="74" cy="80" rx="3" ry="4.5" fill="#1A1A1A" opacity="0.5" transform="rotate(10 74 80)"/>
  <!-- Eyes — simple dots -->
  <circle cx="47" cy="62" r="5" fill="#1A3A1A"/>
  <circle cx="73" cy="62" r="5" fill="#1A3A1A"/>
  <!-- Cheeks — pink to suggest watermelon inside -->
  <ellipse cx="36" cy="72" rx="10" ry="7" fill="#F07080" opacity="0.38"/>
  <ellipse cx="84" cy="72" rx="10" ry="7" fill="#F07080" opacity="0.38"/>
  <!-- Smile -->
  <path d="M 45 76 Q 60 92 75 76" stroke="#1A3A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
